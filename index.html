<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Hinteregger</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: clamp(32px, 8vw, 80px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .tagline {
      font-size: clamp(16px, 3vw, 24px);
      font-weight: 300;
      color: #666;
      letter-spacing: 0.05em;
    }
    .tagline .emoji {
      display: inline-block;
      margin-left: 8px;
    }
    .links {
      margin-top: 40px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .links a:hover {
      color: #fff;
    }
    .links a::after {
      content: '↗';
      margin-left: 4px;
      font-size: 12px;
    }
    
    /* Animation */
    h1 {
      animation: fadeIn 1s ease-out;
    }
    .tagline {
      animation: fadeIn 1s ease-out 0.2s both;
    }
    .links {
      animation: fadeIn 1s ease-out 0.4s both;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Samuel Hinteregger</h1>
    <p class="tagline">Medizinstudent · Entrepreneur · Athlete<span class="emoji">🦅</span></p>
    
    <div class="links">
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="mailto:hintereggerdistribution@gmail.com">Email</a>
      <a href="#">LinkedIn</a>
      <a href="#">Instagram</a>
    </div>
  </div>
</body>
</html>
